services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: ./backend/.env
        required: false
      - path: ./.env
        required: false
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
